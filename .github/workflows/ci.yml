name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # uv é necessário para o teste de integração cross-process do
      # sidecar (forge-sidecar/tests/python_sidecar.rs sobe o servidor
      # Python de verdade); sem ele o teste pula graciosamente.
      - uses: astral-sh/setup-uv@v5
      - run: cd python && uv sync
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo fmt --all --check

  # Gate de supply-chain (advisories/licenças) — porte da rust-migration.
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pytest

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Bloqueante (postura herdada do fork do opencode): segredos não entram.
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Self-hosting (Fase 5 Onda 6, ADR 0010): a plataforma se verifica com sua
  # própria ferramenta. Job separado do `rust` de propósito — não arrisca o
  # gate que já funciona; a fusão dos dois é possível depois. `forge verify`
  # já sai com exit ≠0 em veredito Fail (Onda 2) — isso sozinho é o gate;
  # o artefato é só a evidência anexada ao run para auditoria.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `forge verify` roda `cargo test --workspace` como parte dos
      # default_steps() — precisa de uv pelo mesmo motivo que o job `rust`
      # precisa (ver comentário lá).
      - uses: astral-sh/setup-uv@v5
      - run: cd python && uv sync
      - run: cargo run -p forge-cli -- verify --out verification-evidence.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-evidence
          path: verification-evidence.json

  # Testes de integração pesada do forge-tools (`#[ignore]` no `cargo test`
  # normal — aparecem como "ignored", nunca verdes por engano; aqui rodam DE
  # VERDADE com `--include-ignored`). Job separado porque exigem dependências
  # externas que o gate `rust` não deve arriscar:
  #  - Contenção do sandbox Docker (Fase 6 Onda 2): os quatro vetores (escrita
  #    fora do mount, rede proibida, timeout, memória) exigem um daemon Docker (o
  #    runner ubuntu tem). O helper `daemon_obrigatorio` FALHA se o daemon não
  #    responder — um teste de contenção que "passa" sem containerizar nada seria
  #    um falso positivo catastrófico.
  #  - Cliente LSP real (Fase 6 Onda 5): dirige o rust-analyzer DE VERDADE contra
  #    um fixture cargo e assere a definição semântica por igualdade. A componente
  #    `rust-analyzer` é instalada abaixo; a guarda no teste FALHA se ela faltar
  #    (mesma postura anti-falso-positivo do sandbox).
  sandbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Confirma que o daemon responde antes — o teste depende dele de propósito.
      - run: docker version
      # O cliente LSP real precisa da componente rust-analyzer (a guarda do teste
      # falha se ela não estiver disponível).
      - run: rustup component add rust-analyzer
      - run: cargo test -p forge-tools -- --include-ignored

  # Benches criterion (Fase 6 Onda 8): compilam e RODAM de verdade, produzindo o
  # baseline comparável dos caminhos quentes (hash canônico, épocas de contexto,
  # gateway sem key via ScriptedGenerator). Job separado porque o profile `bench`
  # é caro e não deve arriscar o gate `rust`. Tempos de medição reduzidos: o
  # objetivo aqui é provar que os benches RODAM (não bit-rot) e produzem baseline,
  # não cravar regressão (não há baseline armazenado a comparar entre runs).
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Cada `--bench` alvo é preciso de propósito: sem ele, `cargo bench` também
      # rodaria os unittests da lib e os testes de integração sob o harness do
      # libtest, que rejeita as flags do criterion (`--warm-up-time`). Assim as
      # flags só chegam aos binários criterion. Tempos reduzidos (prova que rodam
      # e produzem baseline, não crava regressão).
      - run: cargo bench -p forge-schemas --bench canonical -- --warm-up-time 0.5 --measurement-time 1
      - run: cargo bench -p forge-core --bench compaction -- --warm-up-time 0.5 --measurement-time 1
      - run: cargo bench -p forge-llm --bench gateway -- --warm-up-time 0.5 --measurement-time 1

  # Load-test k6 do caminho do gateway (Fase 6 Onda 8b, critério de conclusão
  # nº 3): sobe o endpoint de carga (`loadgen`, que embrulha o ScriptedGenerator
  # — sem key real), martela com k6 e valida o P95 sob o limiar. O threshold vive
  # no script (`p(95)<100`); o k6 sai ≠0 se estourar — o gate é REAL, não
  # decorativo. Job separado (precisa do binário de pé + k6 instalado), não
  # arrisca o gate `rust`.
  k6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: grafana/setup-k6-action@v1
      - name: Sobe o endpoint de carga e espera ficar pronto
        run: |
          cargo build -p forge-server --bin loadgen
          ./target/debug/loadgen &
          echo $! > loadgen.pid
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:7900/health && break
            sleep 1
          done
      - name: Roda o k6 (valida o P95 — sai ≠0 se o threshold estourar)
        run: k6 run infra/k6/gateway_load.js
      - name: Encerra o endpoint de carga
        if: always()
        run: kill "$(cat loadgen.pid)" 2>/dev/null || true
