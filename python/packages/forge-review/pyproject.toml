[project]
name = "forge-review"
version = "0.1.0"
description = "Review orientado a valor da plataforma Forge: reviewers, value_score, quality gates"
requires-python = ">=3.11"
# forge-promptforge só pelo canonical_json/sha256_hex (evidence_hash da
# certificação) — reusa o mesmo esquema de hash do prompt-cache-key.v1 em
# vez de inventar um segundo algoritmo de hash no projeto.
dependencies = ["pydantic>=2", "forge-promptforge"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forge_review"]

[tool.uv.sources]
forge-promptforge = { workspace = true }
